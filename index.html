<!DOCTYPE html>
<!--https://gemini.google.com/app/cd2292a0b5bd92e8-->
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Quản Lý Võ Đường</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .auth-container { max-width: 450px; margin: 60px auto; }
    .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .nav-pills .nav-link.active { background-color: #dc3545; }
    .hidden { display: none !important; }
    .table-responsive { font-size: 0.85rem; }
    #reader { width: 100%; border-radius: 10px; overflow: hidden; }
  </style>
</head>
<body>

<div id="auth-section" class="container auth-container">
  <div class="card p-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-danger"><i class="bi bi-shield-shaded"></i> VÕ ĐƯỜNG</h2>
      <p class="text-muted small">Hệ thống quản lý võ sinh trực tuyến</p>
    </div>

    <ul class="nav nav-pills nav-fill mb-4" id="pills-tab">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-login">Đăng nhập</button></li>
      <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-reg">Đăng ký</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="tab-login">
        <form id="loginForm">
          <div class="mb-3">
            <input type="text" id="user" class="form-control" placeholder="Tên đăng nhập" required>
          </div>
          <div class="mb-3">
            <input type="password" id="pass" class="form-control" placeholder="Mật khẩu" required>
          </div>
          <button type="submit" class="btn btn-danger w-100 fw-bold">ĐĂNG NHẬP</button>
        </form>
      </div>

      <div class="tab-pane fade" id="tab-reg">
        <form id="regForm">
          <input type="text" id="regName" class="form-control mb-2" placeholder="Họ và tên" required>
          <input type="email" id="regEmail" class="form-control mb-2" placeholder="Email" required>
          <input type="text" id="regUser" class="form-control mb-2" placeholder="Tên đăng nhập mới" required>
          <input type="password" id="regPass" class="form-control mb-3" placeholder="Mật khẩu" required>
          <button type="submit" class="btn btn-outline-danger w-100 fw-bold">GỬI ĐĂNG KÝ</button>
        </form>
      </div>
    </div>
    <div id="auth-msg" class="mt-3 text-center small text-danger"></div>
  </div>
</div>

<div id="dashboard" class="container py-4 hidden">
  <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded shadow-sm">
    <div>
      <h5 class="mb-0">Xin chào, <span id="display-name" class="text-danger fw-bold">...</span></h5>
      <span id="role-tag" class="badge bg-secondary">User</span>
    </div>
    <button onclick="logout()" class="btn btn-sm btn-outline-dark">Đăng xuất</button>
  </div>

  <div class="card overflow-hidden">
    <div class="bg-light border-bottom">
      <ul class="nav nav-tabs border-0" id="dashTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#t-lh" onclick="fetchData('LICHHOC')">Lịch học</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-hp" onclick="fetchData('HOCPHI')">Học phí</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#t-don" onclick="fetchData('DONTAPLUYEN')">Đơn từ</button></li>

        <!--VÔ HIỆU HOÁ QUÉT QR
        <li class="nav-item"><button class="nav-link text-success" data-bs-toggle="tab" data-bs-target="#t-qr"><i class="bi bi-qr-code-scan"></i> Quét QR</button></li>
        -->
      </ul>
    </div>

    <div class="tab-content p-3">
      <div class="tab-pane fade show active" id="t-lh"><div class="table-container" id="box-LICHHOC">Đang tải...</div></div>
      <div class="tab-pane fade" id="t-hp"><div class="table-container" id="box-HOCPHI">Đang tải...</div></div>
      
      <div class="tab-pane fade" id="t-don">
        <button class="btn btn-sm btn-danger mb-3" data-bs-toggle="collapse" data-bs-target="#collapseDon">Gửi đơn mới +</button>
        <div class="collapse mb-4" id="collapseDon">
          <form id="donForm" class="p-3 border rounded bg-light">
            <div class="row g-2">
              <div class="col-md-4">
                <select id="donType" class="form-select form-select-sm"><option>Xin nghỉ phép</option><option>Đăng ký thi đai</option></select>
              </div>
              <div class="col-md-6">
                <input type="text" id="donReason" class="form-control form-control-sm" placeholder="Lý do..." required>
              </div>
              <div class="col-md-2">
                <button type="submit" class="btn btn-dark btn-sm w-100">Gửi</button>
              </div>
            </div>
          </form>
        </div>
        <div id="box-DONTAPLUYEN"></div>
      </div>

      <!-- VÔ HIỆU HOÁ QUÉT MÃ QR
      <div class="tab-pane fade text-center" id="t-qr">
        <div id="reader" class="mx-auto" style="max-width: 350px;"></div>
        <div id="qr-result" class="mt-3 fw-bold"></div>
      </div>
      -->
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // CẤU HÌNH: Dán URL Web App của bạn vào đây
  const API_URL = "https://script.google.com/macros/s/AKfycbz7sqrmhsCp1c8UQb2bRxkiU5VybTuACg-q2D599FjUT87I1IMhjFhOdQX599Tn4wuBGw/exec"; 
  //link google sheet https://docs.google.com/spreadsheets/d/19PoD80zX9jB0Bfduk6XeC7Zn6URHrkpa5llcaZsc3Ss/edit?gid=681130383#gid=681130383
  let SESSION = { user: "", role: "", hoten: "" };

  // Hàm gọi API dùng chung
  async function apiRequest(action, data = {}) {
    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action, data })
      });
      return await response.json();
    } catch (err) {
      console.error(err);
      return { status: "error", msg: "Không thể kết nối đến máy chủ" };
    }
  }

  // Đăng nhập
  document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true; btn.innerText = "Đang kiểm tra...";

    const res = await apiRequest('login', { 
      user: document.getElementById('user').value, 
      pass: document.getElementById('pass').value 
    });

    if (res.status === "success") {
      SESSION = { user: res.username, role: res.role, hoten: res.hoten };
      showDashboard();
    } else {
      document.getElementById('auth-msg').innerText = res.msg;
    }
    btn.disabled = false; btn.innerText = "ĐĂNG NHẬP";
  };

  function showDashboard() {
    document.getElementById('auth-section').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('display-name').innerText = SESSION.hoten;
    document.getElementById('role-tag').innerText = SESSION.role;
    fetchData('LICHHOC');
  }

  function logout() { location.reload(); }

  // Lấy dữ liệu bảng
  async function fetchData(sheetName) {
    const container = document.getElementById('box-' + sheetName);
    container.innerHTML = `<div class="text-center p-5"><div class="spinner-border text-danger spinner-border-sm"></div> Đang tải dữ liệu...</div>`;

    const res = await apiRequest('getData', { 
      username: SESSION.user, 
      role: SESSION.role, 
      sheetName: sheetName 
    });

    if (res.error || !res.rows || res.rows.length === 0) {
      container.innerHTML = "<div class='alert alert-light text-center'>Không có dữ liệu hiển thị.</div>";
      return;
    }

    let html = '<div class="table-responsive"><table class="table table-hover align-middle"><thead><tr class="table-light">';
    let startIdx = (SESSION.role === "Admin") ? 0 : 1;
    for (let i = startIdx; i < res.header.length; i++) html += `<th>${res.header[i]}</th>`;
    html += '</tr></thead><tbody>';

    res.rows.forEach(row => {
      html += '<tr>';
      for (let j = startIdx; j < row.length; j++) {
        let val = row[j];
        if (String(val).includes("http")) {
          html += `<td><a href="${val}" target="_blank" class="btn btn-xs btn-outline-primary py-0 px-2">Link</a></td>`;
        } else {
          html += `<td>${val}</td>`;
        }
      }
      html += '</tr>';
    });
    container.innerHTML = html + '</tbody></table></div>';
  }

  // Gửi đơn
  document.getElementById('donForm').onsubmit = async (e) => {
    e.preventDefault();
    const res = await apiRequest('submitForm', {
      user: SESSION.user,
      type: document.getElementById('donType').value,
      reason: document.getElementById('donReason').value
    });
    if(res.status === "success") {
      alert("Gửi đơn thành công!");
      e.target.reset();
      fetchData('DONTAPLUYEN');
    }
  };

  // Quét QR
  let scanner = null;
  document.querySelector('button[data-bs-target="#t-qr"]').onclick = () => {
    if (!scanner) {
      scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
      scanner.render(async (text) => {
        if (text === "DIEM_DANH_VO_SINH") { // Nội dung mã QR bạn tạo
          const res = await apiRequest('checkIn', { username: SESSION.user });
          document.getElementById('qr-result').innerHTML = `<span class="${res.status === 'success' ? 'text-success' : 'text-danger'}">${res.msg}</span>`;
          if(res.status === 'success') scanner.clear();
        }
      });
    }
  };

  //MÃ ĐĂNG KÝ
  // Xử lý Đăng ký
document.getElementById('regForm').onsubmit = async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  const msgDiv = document.getElementById('auth-msg');
  
  btn.disabled = true; 
  btn.innerText = "Đang gửi đăng ký...";
  msgDiv.innerText = "";

  const res = await apiRequest('register', { 
    fullname: document.getElementById('regName').value,
    email: document.getElementById('regEmail').value,
    user: document.getElementById('regUser').value, 
    pass: document.getElementById('regPass').value 
  });

  if (res.status === "success") {
    alert("Đăng ký thành công! Bạn có thể đăng nhập ngay.");
    e.target.reset();
    // Chuyển sang tab đăng nhập
    document.querySelector('[data-bs-target="#tab-login"]').click();
  } else {
    msgDiv.innerText = res.msg;
  }
  
  btn.disabled = false; 
  btn.innerText = "GỬI ĐĂNG KÝ";
};
</script>
</body>
</html>
